site_name: Auto-Lorebook
site_description: Automated lorebook / familiar memory pipeline.
site_author: corvous
site_url: https://corvous.github.io/Auto-Lorebook/

repo_name: corvous/Auto-Lorebook
repo_url: https://github.com/corvous/Auto-Lorebook
edit_uri: edit/main/docs/

strict: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.action.edit
  palette::
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting started:
      - getting-started/installation.md
      - getting-started/first-ingest.md
      - getting-started/entities.md
  - Architecture:
      - architecture/overview.md
      - architecture/repository-layout.md
      - architecture/schema-versioning.md
      - architecture/staleness.md
      - architecture/entity-model.md
      - architecture/timestamps.md
  - Pipeline:
      - pipeline/context.md
      - pipeline/reading.md
      - pipeline/planner.md
      - pipeline/extractor.md
      - pipeline/review.md
      - pipeline/summarizer.md
  - Reference:
      - reference/cli.md
      - reference/file-formats.md
      - reference/audit.md
  - Roadmap: roadmap/index.md
  - Contributing: contributing.md
  - ADRs:
      - adr/0001-plan-canonicality.md
      - adr/0002-status-edit-audit-asymmetry.md
      - adr/0003-wiki-state-lives-inside-the-wiki.md
      - adr/0004-sqlite-replaces-yaml-wiki-store.md